name = "streg-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

# After deploying, set these secrets with:
#   npx wrangler secret put REPLICATE_API_TOKEN
#   npx wrangler secret put FAMILY_PIN
#   npx wrangler secret put AUTH_SECRET  (any random string for signing tokens)
#
[[kv_namespaces]]
binding = "COST_LOG"
id = "df39121f0793413cb764fc4f0f95b078"

[[kv_namespaces]]
binding = "EVAL_STORE"
id = "c4aa71e2e1bf4f6fb22b738c6e7adf26"

[vars]
ALLOWED_ORIGIN = "https://streg.pages.dev"
